name: Level Labeler Trigger

on:
  pull_request:
    types: [opened, synchronized]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  check-level:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Level
        uses: actions/github-script@v7
        with:
          script: |
            let level = null;
            const eventName = context.eventName;
            const payload = context.payload;
            const targetNumber = context.issue.number;

            console.log(`Event: ${eventName}, Target: #${targetNumber}`);

            if (eventName === 'issue_comment') {
              const body = payload.comment.body.trim();
              const association = payload.comment.author_association;
              const isTrusted = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association);

              console.log(`Comment body: "${body}", Trusted: ${isTrusted}`);

              if (body.startsWith('/addlevel ') && isTrusted) {
                const requestedLevel = body.split(' ')[1].toLowerCase();
                const validLevels = ['beginner', 'intermediate', 'advanced', 'critical'];
                if (validLevels.includes(requestedLevel)) {
                  level = `level:${requestedLevel}`;
                  console.log(`Selected manual level: ${level}`);
                }
              }
            } else if (eventName === 'pull_request') {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: targetNumber,
              });

              const paths = files.map(f => f.filename);
              console.log(`Changed files count: ${paths.length}`);
              
              const advancedPaths = ['packages/db/', 'packages/core/', 'packages/sync/', 'packages/network/', 'packages/storage/'];
              const intermediatePaths = ['packages/react/', 'packages/solid/', 'packages/vue/', 'packages/cli/', 'packages/auth/', 'packages/sdk/'];
              
              if (paths.some(p => advancedPaths.some(ap => p.startsWith(ap)))) {
                level = 'level:advanced';
              } else if (paths.some(p => intermediatePaths.some(ip => p.startsWith(ip)))) {
                level = 'level:intermediate';
              } else {
                level = 'level:beginner';
              }
              console.log(`Selected automatic level: ${level}`);
            }

            if (level) {
              const fs = require('fs');
              fs.writeFileSync('level.txt', level);
              fs.writeFileSync('number.txt', targetNumber.toString());
              console.log('Artifact data saved.');
            } else {
              console.log('No level assigned for this event.');
            }

      - name: Upload info
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: level-info
          path: |
            level.txt
            number.txt
          retention-days: 1
        continue-on-error: true
